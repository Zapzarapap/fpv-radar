<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FPV AirGuard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --page-bg:#111; --page-fg:#ddd;
  --ctrl-bg:rgba(17,17,17,0.92); --ctrl-border:rgba(255,255,255,0.07);
  --input-bg:rgba(255,255,255,0.06); --input-border:rgba(255,255,255,0.1); --input-fg:#ddd;
  --input-focus:rgba(68,136,255,0.4); --placeholder:#666;
  --label:#666;
  --btn-bg:rgba(68,136,255,0.12); --btn-border:rgba(68,136,255,0.2); --btn-fg:#5a9fff;
  --radius-bg:rgba(255,255,255,0.06); --radius-border:rgba(255,255,255,0.1); --radius-fg:#ddd;
  --toggle-bg:rgba(68,136,255,0.1); --toggle-border:rgba(68,136,255,0.18); --toggle-fg:#5a9fff;
  --toggle-active-bg:rgba(255,68,68,0.08); --toggle-active-border:rgba(255,68,68,0.18); --toggle-active-fg:#ff5555;
  --status-bg:rgba(17,17,17,0.85); --status-border:rgba(255,255,255,0.05); --status-fg:#ccc;
  --popup-bg:rgba(20,20,20,0.97); --popup-fg:#ddd; --popup-border:rgba(255,255,255,0.06);
  --popup-label:#777; --popup-value:#ddd;
  --zoom-bg:rgba(17,17,17,0.88); --zoom-fg:#aaa; --zoom-hover-bg:rgba(40,40,40,0.9); --zoom-hover-fg:#fff;
  --attr-bg:rgba(0,0,0,0.3); --attr-fg:#555; --attr-link:#888;
  --gps-ok:#5a9fff; --gps-fail:#ff5555;
  --lock-fg:#ff8844;
  --coord-bg:rgba(68,136,255,0.08); --coord-border:rgba(68,136,255,0.12); --coord-fg:#5a9fff;
  --gps-btn-fg:#ff8844; --gps-btn-border:rgba(255,136,68,0.15); --gps-btn-bg:rgba(255,136,68,0.06);
  --api-msg:#777;
  --loading-bg:rgba(17,17,17,0.92); --loading-border:rgba(255,255,255,0.06);
  --flash-bg:#ff0000;
  --start-fg:#44cc44; --stop-fg:#ff5555;
}
[data-theme="light"] {
  --page-bg:#f5f5f5; --page-fg:#333;
  --ctrl-bg:rgba(255,255,255,0.93); --ctrl-border:rgba(0,0,0,0.07);
  --input-bg:rgba(0,0,0,0.04); --input-border:rgba(0,0,0,0.08); --input-fg:#333;
  --input-focus:rgba(68,136,255,0.5); --placeholder:#aaa;
  --label:#888;
  --btn-bg:rgba(68,136,255,0.1); --btn-border:rgba(68,136,255,0.2); --btn-fg:#4488ff;
  --radius-bg:rgba(0,0,0,0.03); --radius-border:rgba(0,0,0,0.08); --radius-fg:#333;
  --toggle-bg:rgba(68,136,255,0.08); --toggle-border:rgba(68,136,255,0.18); --toggle-fg:#4488ff;
  --toggle-active-bg:rgba(255,68,68,0.06); --toggle-active-border:rgba(255,68,68,0.15); --toggle-active-fg:#dd3333;
  --status-bg:rgba(245,245,245,0.9); --status-border:rgba(0,0,0,0.06); --status-fg:#555;
  --popup-bg:rgba(250,250,250,0.98); --popup-fg:#333; --popup-border:rgba(0,0,0,0.08);
  --popup-label:#888; --popup-value:#333;
  --zoom-bg:rgba(255,255,255,0.88); --zoom-fg:#666; --zoom-hover-bg:rgba(240,240,240,0.95); --zoom-hover-fg:#333;
  --attr-bg:rgba(255,255,255,0.5); --attr-fg:#888; --attr-link:#666;
  --gps-ok:#4488ff; --gps-fail:#dd3333;
  --lock-fg:#cc6600;
  --coord-bg:rgba(68,136,255,0.06); --coord-border:rgba(68,136,255,0.12); --coord-fg:#4488ff;
  --gps-btn-fg:#cc6600; --gps-btn-border:rgba(204,102,0,0.15); --gps-btn-bg:rgba(204,102,0,0.05);
  --api-msg:#888;
  --loading-bg:rgba(245,245,245,0.95); --loading-border:rgba(0,0,0,0.08);
  --flash-bg:#ff0000;
  --start-fg:#22aa22; --stop-fg:#dd3333;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--page-bg);color:var(--page-fg);overflow:hidden}
body{position:fixed;touch-action:manipulation}
#map{height:100%;width:100%;z-index:1;position:relative}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--api-msg);font-size:14px;z-index:2000;background:var(--loading-bg);padding:14px 22px;border-radius:10px;border:1px solid var(--loading-border);text-align:center;line-height:1.5;max-width:300px}
#controls{position:absolute;top:calc(10px + env(safe-area-inset-top,0px));left:calc(10px + env(safe-area-inset-left,0px));z-index:1000;background:var(--ctrl-bg);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border:1px solid var(--ctrl-border);border-radius:12px;padding:8px 10px;width:210px;box-shadow:0 4px 24px rgba(0,0,0,0.5);max-width:calc(100vw - 20px - env(safe-area-inset-left,0px) - env(safe-area-inset-right,0px))}
#controls .label{font-size:8px;text-transform:uppercase;letter-spacing:1.2px;color:var(--label);margin-bottom:2px}
.cg{margin-bottom:4px}
.cg:last-child{margin-bottom:0}
.row{display:flex;gap:3px;align-items:center}
.row input{flex:1;background:var(--input-bg);border:1px solid var(--input-border);border-radius:5px;padding:5px 7px;color:var(--input-fg);font-size:11px;outline:none;min-width:0;height:26px}
.row input:focus{border-color:var(--input-focus)}
.row input::placeholder{color:var(--placeholder)}
.row button{background:var(--btn-bg);border:1px solid var(--btn-border);border-radius:5px;padding:4px 6px;color:var(--btn-fg);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0;line-height:1;height:26px;display:inline-flex;align-items:center;justify-content:center;min-width:26px}
.row button:active{transform:scale(0.96)}
.coord-row{display:none;gap:3px;align-items:center}
.coord-row.show{display:flex}
.coord-row input{background:var(--input-bg);border:1px solid var(--input-border);border-radius:5px;padding:5px 6px;color:var(--input-fg);font-size:11px;outline:none;font-variant-numeric:tabular-nums;height:26px;width:62px;flex:none}
.coord-row input:focus{border-color:var(--input-focus)}
.coord-row input::placeholder{color:var(--placeholder)}
.coord-row button{background:var(--btn-bg);border:1px solid var(--btn-border);border-radius:5px;padding:4px 6px;color:var(--btn-fg);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0;height:26px;min-width:26px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
.coord-row button:active{transform:scale(0.96)}
.coord-row .lock-on,.row .lock-on{color:var(--lock-fg);border-color:rgba(255,136,68,0.25);background:rgba(255,136,68,0.08)}
#gps-status{font-size:7px;color:var(--api-msg);margin-top:2px;line-height:1.2;cursor:pointer}
#gps-status.ok{color:var(--gps-ok)}
#gps-status.fail{color:var(--gps-fail)}
.radius-wrap{display:flex;align-items:center;gap:4px}
#radius-input{width:46px;background:var(--radius-bg);border:1px solid var(--radius-border);border-radius:5px;padding:4px 6px;color:var(--radius-fg);font-size:12px;outline:none;font-variant-numeric:tabular-nums;text-align:center;height:24px}
#radius-input:focus{border-color:var(--input-focus)}
#radius-input::-webkit-outer-spin-button,#radius-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
#radius-input[type=number]{-moz-appearance:textfield}
.radius-unit{font-size:10px;color:var(--api-msg);flex-shrink:0}
.ctrl-row{display:flex;gap:3px;align-items:center}
#toggle-btn{flex:1;background:var(--toggle-bg);border:1px solid var(--toggle-border);border-radius:7px;padding:7px 0;color:var(--toggle-fg);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-variant-numeric:tabular-nums;height:30px;display:inline-flex;align-items:center;justify-content:center;gap:4px}
#toggle-btn:active{transform:scale(0.97)}
#toggle-btn.active{background:var(--toggle-active-bg);border-color:var(--toggle-active-border);color:var(--toggle-active-fg)}
#toggle-btn .ico{font-size:14px}
#toggle-btn.active .ico{color:var(--stop-fg)}
#toggle-btn .ico-play{color:var(--start-fg)}
#theme-btn{background:var(--btn-bg);border:1px solid var(--btn-border);border-radius:5px;padding:4px 6px;color:var(--btn-fg);font-size:15px;cursor:pointer;transition:all .2s;flex-shrink:0;line-height:1;height:30px;width:30px;display:inline-flex;align-items:center;justify-content:center}
#controls{touch-action:manipulation}
#theme-btn:active{transform:scale(0.96)}
.lock-hint{font-size:7px;color:var(--lock-fg);display:none;margin-top:1px}
.lock-hint.show{display:block}
#lock-label{font-weight:400;text-transform:none;letter-spacing:0;font-size:7px;margin-left:3px;color:var(--label)}
#lock-label.locked{color:var(--lock-fg)}
#status-bar{position:absolute;bottom:calc(14px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);z-index:1000;background:var(--status-bg);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border:1px solid var(--status-border);border-radius:22px;padding:5px 14px;display:flex;gap:12px;font-size:10px;font-weight:500;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
.status-item{display:flex;align-items:center;gap:3px;white-space:nowrap}
.status-dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-red{background:#ff4444;box-shadow:0 0 5px rgba(255,68,68,0.3)}
.dot-yellow{background:#ffcc00;box-shadow:0 0 5px rgba(255,204,0,0.2)}
.dot-green{background:#44ff44;box-shadow:0 0 5px rgba(68,255,68,0.15)}
.status-count{font-variant-numeric:tabular-nums;min-width:10px;text-align:center;color:var(--status-fg)}
#flash{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--flash-bg);pointer-events:none;z-index:9999;opacity:0}
.pilot-marker{background:none!important;border:none!important}
.pulse-dot{width:14px;height:14px;background:#4488ff;border:2px solid rgba(68,136,255,0.4);border-radius:50%;position:relative}
.pulse-dot::after{content:'';position:absolute;top:-5px;left:-5px;right:-5px;bottom:-5px;border-radius:50%;border:2px solid rgba(68,136,255,0.15);animation:pulse-ring 2.5s ease-out infinite}
@keyframes pulse-ring{0%{transform:scale(0.8);opacity:1}100%{transform:scale(2.2);opacity:0}}
.aircraft-icon{background:none!important;border:none!important}
.leaflet-popup-content-wrapper{background:var(--popup-bg)!important;color:var(--popup-fg)!important;border:1px solid var(--popup-border)!important;border-radius:10px!important;box-shadow:0 6px 30px rgba(0,0,0,0.6)!important;font-size:10px!important;line-height:1.6!important}
.leaflet-popup-tip{background:var(--popup-bg)!important;border:1px solid var(--popup-border)!important;box-shadow:none!important}
.leaflet-popup-close-button{color:var(--popup-label)!important;font-size:15px!important;top:4px!important;right:5px!important;width:22px!important;height:22px!important;line-height:22px!important}
.leaflet-popup-close-button:hover{color:var(--popup-fg)!important}
.leaflet-popup-content{margin:10px 14px!important}
.popup-content{min-width:150px}
.popup-row{display:flex;justify-content:space-between;padding:1px 0;gap:10px}
.popup-label{color:var(--popup-label)}
.popup-value{color:var(--popup-value);font-weight:500;text-align:right;font-variant-numeric:tabular-nums}
.popup-status{margin-top:4px;padding-top:4px;border-top:1px solid var(--popup-border);text-align:center;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:1.5px}
.status-inside{color:#ff4444}
.status-approaching{color:#ffcc00}
.status-passing{color:#44ff44}
.leaflet-control-zoom a{background:var(--zoom-bg)!important;color:var(--zoom-fg)!important;border-color:var(--ctrl-border)!important}
.leaflet-control-zoom a:hover{background:var(--zoom-hover-bg)!important;color:var(--zoom-hover-fg)!important}
.leaflet-control-attribution{background:var(--attr-bg)!important;color:var(--attr-fg)!important;font-size:8px!important;padding:2px 6px!important}
.leaflet-control-attribution a{color:var(--attr-link)!important}
@media(max-width:480px){
#controls{top:calc(6px + env(safe-area-inset-top,0px));left:calc(6px + env(safe-area-inset-left,0px));right:calc(6px + env(safe-area-inset-right,0px));width:auto;min-width:unset;padding:6px 8px;max-width:none}
#status-bar{bottom:calc(8px + env(safe-area-inset-bottom,0px));font-size:9px;padding:4px 10px;gap:8px}
}
</style>
</head>
<body>
<div id="loading">Locating via GPS…</div><div id="map"></div>
<div id="controls">
<div class="cg">
<div class="label">Location<span id="lock-label">(unlocked)</span></div>
<div class="row" id="search-mode">
<input type="text" id="search-input" placeholder="City, airport..." autocomplete="off">
<button class="icon-btn" id="lock-btn"><svg viewBox="0 0 10 12" width="9" height="11"><rect x="1" y="4" width="8" height="7" rx="0.8" fill="currentColor"/><path d="M2.5 4V2.5a2.5 2.5 0 0 1 5 0" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></button>
<button class="icon-btn" id="show-coord"><svg viewBox="0 0 12 12" width="11" height="11"><circle cx="6" cy="6" r="4.5" fill="none" stroke="currentColor" stroke-width="1"/><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1"/></svg></button>
</div>
<div class="coord-row" id="coord-mode">
<input type="number" id="lat-input" placeholder="Lat" step="any">
<input type="number" id="lng-input" placeholder="Lng" step="any">
<button id="lock-btn-c"><svg viewBox="0 0 10 12" width="9" height="11"><rect x="1" y="4" width="8" height="7" rx="0.8" fill="currentColor"/><path d="M2.5 4V2.5a2.5 2.5 0 0 1 5 0" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></button>
<button id="show-search"><svg viewBox="0 0 12 12" width="11" height="11"><circle cx="6" cy="6" r="4.5" fill="none" stroke="currentColor" stroke-width="1"/><path d="M1.5 6h9M6 1.5c1.5 1 2.5 2.5 2.5 4.5S7.5 9.5 6 10.5" stroke="currentColor" stroke-width="1" fill="none"/><path d="M6 1.5c-1.5 1-2.5 2.5-2.5 4.5S4.5 9.5 6 10.5" stroke="currentColor" stroke-width="1" fill="none"/></svg></button>
</div>
<div id="gps-status">Starting...</div>
<div class="lock-hint" id="lock-hint">Unlock to change position</div>
</div>
<div class="cg">
<div class="label">Radius</div>
<div class="radius-wrap">
<input type="number" id="radius-input" value="3" min="0.1" max="99" step="0.5">
<span class="radius-unit">km</span>
</div>
</div>
<div class="cg">
<div class="ctrl-row">
<button id="toggle-btn"><span class="ico ico-play">&#9654;</span></button>
<button id="theme-btn"><svg viewBox="0 0 14 14" width="15" height="15"><circle cx="7" cy="7" r="2.5" fill="currentColor"/><g stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><line x1="7" y1=".5" x2="7" y2="3"/><line x1="7" y1="11" x2="7" y2="13.5"/><line x1=".5" y1="7" x2="3" y2="7"/><line x1="11" y1="7" x2="13.5" y2="7"/><line x1="1.8" y1="1.8" x2="3.6" y2="3.6"/><line x1="10.4" y1="10.4" x2="12.2" y2="12.2"/><line x1="1.8" y1="12.2" x2="3.6" y2="10.4"/><line x1="10.4" y1="3.6" x2="12.2" y2="1.8"/></g></svg></button>
</div>
</div>
</div>
<div id="status-bar">
<div class="status-item"><span class="status-dot dot-red"></span><span class="status-count" id="count-inside">0</span></div>
<div class="status-item"><span class="status-dot dot-yellow"></span><span class="status-count" id="count-approaching">0</span></div>
<div class="status-item"><span class="status-dot dot-green"></span><span class="status-count" id="count-passing">0</span></div>
</div>
<div id="flash"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============================================
// Constants
// ============================================

const CATEGORY = {'0':'Unbekannt','1':'Keine Daten','2':'Klein','3':'Mittel','4':'Groß','5':'High Vortex','6':'Schwer','7':'Hochleistung','8':'Drehflügler','9':'Segelflugzeug','10':'Luftschiff','11':'Fallschirm','12':'Ultraleicht','13':'Reserviert','14':'UAV','15':'Weltraum','16':'Notfall','17':'Boden','A1':'Klein','A2':'Mittel','A3':'Groß','A4':'High Vortex','A5':'Schwer','A6':'Hochleistung','A7':'Drehflügler'};

const METERS_PER_DEG_LAT = 110540;
const METERS_PER_DEG_LON = 111320;
const KNOTS_TO_KMPH = 1.852;
const KNOTS_TO_MPS = 0.514444;
const EARTH_RADIUS_KM = 6371;

// ============================================
// State
// ============================================

let map;
let pilotMarker = null;
let zoneCircle;
let tileLayer;
let pilotLat;
let pilotLon;
let monitoring = false;
let fetchInterval = null;
const markers = {};
let prev = {};
let locked = false;
let insideTimer = null;
let approachTimer = null;
let audioCtx = null;
let homeLat = null;
let homeLon = null;

const gpsStatusEl = document.getElementById('gps-status');
let theme = localStorage.getItem('ag-theme') || 'dark';

// ============================================
// Helpers
// ============================================

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function lockIconSvg(locked) {
  return '<svg viewBox="0 0 10 12" width="9" height="11"><rect x="1" y="4" width="8" height="7" rx="0.8" fill="currentColor"/><path d="M2.5 4V2.5a2.5 2.5 0 0 1 5 0' + (locked ? 'V4' : '') + '" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>';
}

function themeIconSvg(isDark) {
  return isDark
    ? '<svg viewBox="0 0 14 14" width="15" height="15"><circle cx="7" cy="7" r="2.5" fill="currentColor"/><g stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><line x1="7" y1=".5" x2="7" y2="3"/><line x1="7" y1="11" x2="7" y2="13.5"/><line x1=".5" y1="7" x2="3" y2="7"/><line x1="11" y1="7" x2="13.5" y2="7"/><line x1="1.8" y1="1.8" x2="3.6" y2="3.6"/><line x1="10.4" y1="10.4" x2="12.2" y2="12.2"/><line x1="1.8" y1="12.2" x2="3.6" y2="10.4"/><line x1="10.4" y1="3.6" x2="12.2" y2="1.8"/></g></svg>'
    : '<svg viewBox="0 0 14 14" width="15" height="15"><path d="M9 2A5 5 0 1 0 12 7A4 4 0 0 1 9 2z" fill="currentColor"/></svg>';
}

function getAudioContext() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function play(oscType, freq, gain, dur) {
  try {
    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gainNode = ctx.createGain();
    osc.connect(gainNode);
    gainNode.connect(ctx.destination);
    osc.type = oscType;
    osc.frequency.value = freq;
    const startTime = ctx.currentTime;
    gainNode.gain.setValueAtTime(gain, startTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
    osc.start(startTime);
    osc.stop(startTime + dur);
  } catch (e) {
    console.error('[AG] play:', e);
  }
}

function fmt(minutes) {
  if (minutes == null || minutes < 0) return 'N/A';
  let min = Math.floor(minutes);
  let sec = Math.round((minutes - min) * 60);
  if (sec >= 60) { min += 1; sec = 0; }
  return min + ':' + (sec < 10 ? '0' : '') + sec;
}

function dist(lat1, lon1, lat2, lon2) {
  const dlat = (lat2 - lat1) * Math.PI / 180;
  const dlon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dlat / 2) * Math.sin(dlat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dlon / 2) * Math.sin(dlon / 2);
  return EARTH_RADIUS_KM * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ============================================
// Aircraft Icon
// ============================================

function aircraftIcon(heading, color, category) {
  const cat = String(category).toUpperCase();
  let svg;
  if (cat === '8' || cat === 'A7') {
    svg = '<svg viewBox="0 0 24 24" width="21" height="21"><rect x="8" y="12" width="8" height="4" rx="1.2" fill="' + color + '" stroke="rgba(0,0,0,0.35)" stroke-width="0.6"/><rect x="11" y="8" width="2" height="4" fill="' + color + '" stroke="rgba(0,0,0,0.35)" stroke-width="0.5"/><rect x="3" y="9.5" width="18" height="2" rx="0.8" fill="' + color + '" stroke="rgba(0,0,0,0.35)" stroke-width="0.5"/><rect x="14" y="13" width="5" height="1.5" rx="0.6" fill="' + color + '" stroke="rgba(0,0,0,0.35)" stroke-width="0.5"/></svg>';
  } else if (cat === '7' || cat === 'A6') {
    svg = '<svg viewBox="0 0 24 24" width="21" height="21"><path d="M12 3L3 18h18z" fill="' + color + '" stroke="rgba(0,0,0,0.35)" stroke-width="0.6"/><rect x="11" y="3" width="2" height="6" fill="' + color + '" stroke="rgba(0,0,0,0.35)" stroke-width="0.5"/><rect x="5.5" y="16" width="13" height="2" rx="0.8" fill="' + color + '" stroke="rgba(0,0,0,0.35)" stroke-width="0.5"/></svg>';
  } else {
    svg = '<svg viewBox="0 0 24 24" width="21" height="21"><path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0 0 11.5 2 1.5 1.5 0 0 0 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z" fill="' + color + '" stroke="rgba(0,0,0,0.35)" stroke-width="0.6" opacity="0.95"/></svg>';
  }
  return L.divIcon({
    html: '<div class="aircraft-icon" style="width:21px;height:21px;transform:rotate(' + (heading != null ? heading : 0) + 'deg);transform-origin:center">' + svg + '</div>',
    className: '',
    iconSize: [21, 21],
    iconAnchor: [10, 10]
  });
}

// ============================================
// Zone Geometry
// ============================================

function cross(lat, lon, hdg, spd, rk) {
  const R = rk * 1000;
  const cl = Math.cos(pilotLat * Math.PI / 180);
  const ax = (lon - pilotLon) * METERS_PER_DEG_LON * cl;
  const ay = (lat - pilotLat) * METERS_PER_DEG_LAT;
  const h = hdg * Math.PI / 180;
  const dx = Math.sin(h);
  const dy = Math.cos(h);
  const t = (-ax) * dx + (-ay) * dy;
  if (t < 0) return false;
  const d = Math.sqrt((ax + t * dx) * (ax + t * dx) + (ay + t * dy) * (ay + t * dy));
  return d <= R;
}

function eta(lat, lon, hdg, spd, rk) {
  if (hdg == null || spd == null || spd <= 0) return null;
  const R = rk * 1000;
  const cl = Math.cos(pilotLat * Math.PI / 180);
  const ax = (lon - pilotLon) * METERS_PER_DEG_LON * cl;
  const ay = (lat - pilotLat) * METERS_PER_DEG_LAT;
  const h = hdg * Math.PI / 180;
  const dx = Math.sin(h);
  const dy = Math.cos(h);
  const b = 2 * (ax * dx + ay * dy);
  const c = ax * ax + ay * ay - R * R;
  const d = b * b - 4 * c;
  if (d < 0) return null;
  const sqrtD = Math.sqrt(d);
  const t1 = (-b - sqrtD) / 2;
  const t2 = (-b + sqrtD) / 2;
  const te = t1 > 0 ? (t1 < t2 ? t1 : t2) : t2 > 0 ? t2 : null;
  if (te == null || te <= 0) return null;
  return te / (spd * KNOTS_TO_MPS) / 60;
}

function ete(lat, lon, hdg, spd, rk) {
  if (hdg == null || spd == null || spd <= 0) return null;
  const R = rk * 1000;
  const cl = Math.cos(pilotLat * Math.PI / 180);
  const ax = (lon - pilotLon) * METERS_PER_DEG_LON * cl;
  const ay = (lat - pilotLat) * METERS_PER_DEG_LAT;
  const h = hdg * Math.PI / 180;
  const dx = Math.sin(h);
  const dy = Math.cos(h);
  const b = 2 * (ax * dx + ay * dy);
  const c = ax * ax + ay * ay - R * R;
  const d = b * b - 4 * c;
  if (d < 0) return null;
  const te = Math.max((-b + Math.sqrt(d)) / 2, (-b - Math.sqrt(d)) / 2);
  if (te <= 0) return null;
  return te / (spd * KNOTS_TO_MPS) / 60;
}

function getZoneStatus(aircraft) {
  const rk = Math.max(parseFloat(document.getElementById('radius-input').value) || 3, 0.1);
  const d = dist(aircraft.lat, aircraft.lon, pilotLat, pilotLon);
  if (d <= rk) {
    return {
      s: 'inside',
      eta: null,
      ete: aircraft.track != null && aircraft.gs != null && aircraft.gs > 0
        ? ete(aircraft.lat, aircraft.lon, aircraft.track, aircraft.gs, rk)
        : null
    };
  }
  if (aircraft.track == null || aircraft.gs == null || aircraft.gs <= 0) {
    return { s: 'passing', eta: null, ete: null };
  }
  if (cross(aircraft.lat, aircraft.lon, aircraft.track, aircraft.gs, rk)) {
    return { s: 'approaching', eta: eta(aircraft.lat, aircraft.lon, aircraft.track, aircraft.gs, rk), ete: null };
  }
  return { s: 'passing', eta: null, ete: null };
}

// ============================================
// Pilot Position
// ============================================

function setPilotPosition(lat, lng, source) {
  if (locked) {
    const hint = document.getElementById('lock-hint');
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 2500);
    return;
  }
  pilotLat = lat;
  pilotLon = lng;
  document.getElementById('lat-input').value = lat.toFixed(5);
  document.getElementById('lng-input').value = lng.toFixed(5);
  gpsStatusEl.textContent = source;
  gpsStatusEl.className = 'ok';
  document.getElementById('loading').style.display = 'none';
  clearTimeout(fallbackTimer);
  if (!map) { initMap(); return; }
  map.setView([pilotLat, pilotLon], 12);
  if (pilotMarker) {
    pilotMarker.setLatLng([pilotLat, pilotLon]);
  } else {
    pilotMarker = L.marker([pilotLat, pilotLon], {
      icon: L.divIcon({
        className: 'pilot-marker',
        html: '<div class="pulse-dot"></div>',
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      })
    }).addTo(map);
  }
  updateZoneCircle();
  if (!fetchInterval) {
    fetchAircraft();
  }
}

function updateLockButton(btn, lockedState) {
  if (btn) {
    btn.innerHTML = lockIconSvg(lockedState);
    btn.classList.toggle('lock-on', lockedState);
  }
}

function toggleLock() {
  locked = !locked;
  updateLockButton(document.getElementById('lock-btn'), locked);
  updateLockButton(document.getElementById('lock-btn-c'), locked);
  const label = document.getElementById('lock-label');
  label.textContent = locked ? '(locked)' : '(unlocked)';
  label.classList.toggle('locked', locked);
  try { getAudioContext(); play('sine', 700, 0.1, 0.05); } catch (e) { /* ignored */ }
}

function setFromCoords() {
  if (locked) {
    const hint = document.getElementById('lock-hint');
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 2500);
    return;
  }
  const lat = parseFloat(document.getElementById('lat-input').value);
  const lng = parseFloat(document.getElementById('lng-input').value);
  if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) {
    gpsStatusEl.textContent = 'Invalid coords.';
    gpsStatusEl.className = 'fail';
    return;
  }
  setPilotPosition(lat, lng, 'Manual set');
}

// ============================================
// Zone Circle
// ============================================

function updateZoneCircle() {
  if (!pilotLat || !pilotLon || !map) return;
  const rk = Math.max(parseFloat(document.getElementById('radius-input').value) || 3, 0.1);
  if (zoneCircle) {
    zoneCircle.setLatLng([pilotLat, pilotLon]);
    zoneCircle.setRadius(rk * 1000);
  } else {
    zoneCircle = L.circle([pilotLat, pilotLon], {
      radius: rk * 1000,
      color: '#4488ff',
      weight: 1.5,
      fillColor: '#4488ff',
      fillOpacity: 0.05,
      opacity: 0.4
    }).addTo(map);
  }
}

// ============================================
// Map
// ============================================

function swapTiles() {
  const url = theme === 'dark'
    ? 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png';
  if (tileLayer) {
    tileLayer.setUrl(url);
  } else if (map) {
    tileLayer = L.tileLayer(url, {
      maxZoom: 19,
      attribution: '&copy; <a href="https://openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>'
    }).addTo(map);
  }
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);
  swapTiles();
  const btn = document.getElementById('theme-btn');
  if (btn) btn.innerHTML = themeIconSvg(theme === 'dark');
}

function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('ag-theme', theme);
  applyTheme();
}

function initMap() {
  if (map) return;
  map = L.map('map', { center: [0, 0], zoom: 2, zoomControl: true, attributionControl: true });
  swapTiles();
  setTimeout(() => map.invalidateSize(), 150);
  map.on('click', (e) => {
    if (locked) return;
    setPilotPosition(e.latlng.lat, e.latlng.lng, 'Map click');
  });
  if (pilotLat != null && pilotLon != null) {
    map.setView([pilotLat, pilotLon], 12);
    pilotMarker = L.marker([pilotLat, pilotLon], {
      icon: L.divIcon({
        className: 'pilot-marker',
        html: '<div class="pulse-dot"></div>',
        iconSize: [20, 20],
        iconAnchor: [10, 10]
      })
    }).addTo(map);
    updateZoneCircle();
    fetchAircraft();
  }
}

// ============================================
// GPS Initialization
// ============================================

let fallbackTimer = setTimeout(() => {
  if (pilotLat != null && pilotLon != null) return;
  document.getElementById('loading').style.display = 'none';
  gpsStatusEl.textContent = 'GPS unavailable. Search or enter coords.';
  gpsStatusEl.className = 'fail';
}, 10000);

function initGPS() {
  if (!navigator.geolocation) {
    gpsStatusEl.textContent = 'GPS not available';
    gpsStatusEl.className = 'fail';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    (position) => {
      homeLat = position.coords.latitude;
      homeLon = position.coords.longitude;
      setPilotPosition(homeLat, homeLon, 'GPS position');
    },
    (error) => {
      alert('GPS error: ' + error.message + ' (code ' + error.code + ')');
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

// ============================================
// Monitoring
// ============================================

function startWarning() {
  if (!pilotLat || !map) return;
  getAudioContext();
  monitoring = true;
  const btn = document.getElementById('toggle-btn');
  btn.innerHTML = '<span class="ico">&#9632;</span>';
  btn.classList.add('active');
  stopApproachAlarm();
  if (insideTimer) { clearInterval(insideTimer); insideTimer = null; }
}

function stopWarning() {
  monitoring = false;
  const btn = document.getElementById('toggle-btn');
  btn.innerHTML = '<span class="ico ico-play">&#9654;</span>';
  btn.classList.remove('active');
  if (insideTimer) { clearInterval(insideTimer); insideTimer = null; }
  stopApproachAlarm();
}

function stopApproachAlarm() {
  if (approachTimer) { clearInterval(approachTimer); approachTimer = null; }
}

function toggleMonitoring() {
  monitoring ? stopWarning() : startWarning();
}

// ============================================
// Aircraft Data
// ============================================

async function fetchAircraft() {
  if (!pilotLat || !pilotLon) return;
  try {
    const ctl = new AbortController();
    const timer = setTimeout(() => ctl.abort(), 4000);
    const r = await fetch('https://api.airplanes.live/v2/point/' + pilotLat + '/' + pilotLon + '/54', { mode: 'cors', signal: ctl.signal });
    clearTimeout(timer);
    if (r.ok) {
      const text = await r.text();
      if (text.length >= 30) processAircraft(JSON.parse(text).ac || []);
    }
  } catch (e) {
    if (e.name !== 'AbortError') console.error('[AG] fetch:', e);
  }
  fetchInterval = setTimeout(fetchAircraft, 1000);
}

function buildPopupHtml(aircraft, zoneStatus) {
  const altFeet = aircraft.alt_geom != null ? aircraft.alt_geom : aircraft.alt_baro;
  const altM = altFeet != null ? (altFeet * 0.3048).toFixed(0) : '\u2014';
  const speedKnots = aircraft.gs != null ? aircraft.gs : aircraft.tas;
  const speedKmh = speedKnots != null ? (speedKnots * KNOTS_TO_KMPH).toFixed(0) : '\u2014';
  const d = dist(aircraft.lat, aircraft.lon, pilotLat, pilotLon);
  const catKey = ('' + aircraft.category).toUpperCase();
  let catLabel = CATEGORY[catKey];
  if (!catLabel) catLabel = aircraft.category != null ? aircraft.category : '\u2014';
  const callSign = ((aircraft.flight || '') + '').trim() || '?';

  let statusLabel, extra = '';
  if (zoneStatus.s === 'inside') {
    statusLabel = 'Inside Zone';
    if (zoneStatus.ete != null) {
      extra += '<div class="popup-row"><span class="popup-label">ETE</span><span class="popup-value">' + fmt(zoneStatus.ete) + '</span></div>';
    }
  } else if (zoneStatus.s === 'approaching') {
    statusLabel = 'Approaching';
    if (zoneStatus.eta != null) {
      extra += '<div class="popup-row"><span class="popup-label">ETA</span><span class="popup-value">' + fmt(zoneStatus.eta) + '</span></div>';
    }
  } else {
    statusLabel = 'Passing';
  }

  return '<div class="popup-content">' +
    '<div class="popup-row"><span class="popup-label">Flight</span><span class="popup-value">' + escapeHtml(callSign) + '</span></div>' +
    '<div class="popup-row"><span class="popup-label">Type</span><span class="popup-value">' + escapeHtml(catLabel) + '</span></div>' +
    '<div class="popup-row"><span class="popup-label">Alt</span><span class="popup-value">' + altM + ' m</span></div>' +
    '<div class="popup-row"><span class="popup-label">Speed</span><span class="popup-value">' + speedKmh + ' km/h</span></div>' +
    '<div class="popup-row"><span class="popup-label">Dist</span><span class="popup-value">' + d.toFixed(1) + ' km</span></div>' +
    extra +
    '<div class="popup-status status-' + zoneStatus.s + '">' + statusLabel + '</div>' +
    '</div>';
}

function updateStatusBar(inside, approaching, passing) {
  document.getElementById('count-inside').textContent = inside || 0;
  document.getElementById('count-approaching').textContent = approaching || 0;
  document.getElementById('count-passing').textContent = passing || 0;
}

// ============================================
// Aircraft Processing
// ============================================

function triggerFlash() {
  const el = document.getElementById('flash');
  el.style.transition = 'none';
  el.style.opacity = '0.15';
  void el.offsetWidth;
  el.style.transition = 'opacity 0.5s ease-out';
  el.style.opacity = '0';
}

function processAircraft(aircraft) {
  const ids = {};
  const statusMap = {};
  let inside = 0, approaching = 0, passing = 0;
  const approachingAircraft = [];

  for (const a of aircraft) {
    const id = a.hex, lat = a.lat, lon = a.lon;
    if (!id || lat == null || lon == null || isNaN(lat) || isNaN(lon)) continue;
    ids[id] = true;

    const status = getZoneStatus(a);
    const statusStr = status.s;
    statusMap[id] = statusStr;
    if (statusStr === 'inside') inside++;
    else if (statusStr === 'approaching') { approaching++; approachingAircraft.push(a); }
    else passing++;

    const color = statusStr === 'inside' ? '#ff4444' : statusStr === 'approaching' ? '#ffcc00' : '#44ff44';
    const popupHtml = buildPopupHtml(a, status);
    if (markers[id]) {
      markers[id].setLatLng([lat, lon]);
      markers[id].setIcon(aircraftIcon(a.track, color, a.category));
      markers[id].setPopupContent(popupHtml);
    } else {
      const m = L.marker([lat, lon], { icon: aircraftIcon(a.track, color, a.category) }).addTo(map);
      m.bindPopup(popupHtml);
      markers[id] = m;
    }

    if (monitoring && statusStr === 'inside' && prev[id] !== 'inside') {
      play('square', 888, 0.3, 2);
      triggerFlash();
    }
  }

  for (const id in markers) {
    if (!ids[id]) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }
  }
  for (const id in prev) {
    if (!ids[id]) delete prev[id];
  }

  if (monitoring && inside > 0 && !insideTimer) {
    insideTimer = setInterval(() => play('square', 888, 0.3, 1.5), 5000);
    play('square', 888, 0.3, 1.5);
  } else if ((!monitoring || inside === 0) && insideTimer) {
    clearInterval(insideTimer);
    insideTimer = null;
  }

  let hasCloseApproach = false;
  for (const a of approachingAircraft) {
    if (a.gs > 0) {
      const rk = Math.max(parseFloat(document.getElementById('radius-input').value) || 3, 0.1);
      const d = dist(a.lat, a.lon, pilotLat, pilotLon);
      if ((d - rk) / (a.gs * KNOTS_TO_KMPH / 60) < 5) {
        hasCloseApproach = true;
        break;
      }
    }
  }
  if (monitoring && hasCloseApproach && !approachTimer) {
    const alarm = () => {
      play('sine', 440, 0.2, 0.15);
      setTimeout(() => play('sine', 440, 0.2, 0.15), 600);
      setTimeout(() => play('sine', 440, 0.2, 0.15), 1200);
    };
    alarm();
    approachTimer = setInterval(alarm, 30000);
  } else if ((!monitoring || !hasCloseApproach) && approachTimer) {
    clearInterval(approachTimer);
    approachTimer = null;
  }

  for (const id in statusMap) prev[id] = statusMap[id];
  updateStatusBar(inside, approaching, passing);
}

// ============================================
// UI Setup
// ============================================

function initUI() {
  document.getElementById('lock-btn').addEventListener('click', toggleLock);
  document.getElementById('lock-btn-c').addEventListener('click', toggleLock);

  document.getElementById('show-coord').addEventListener('click', () => {
    document.getElementById('search-mode').style.display = 'none';
    document.getElementById('coord-mode').classList.add('show');
    if (homeLat != null && homeLon != null && map) {
      setPilotPosition(homeLat, homeLon, 'GPS position');
    } else if (pilotLat != null && pilotLon != null && map) {
      map.setView([pilotLat, pilotLon], 12);
    }
  });
  document.getElementById('show-search').addEventListener('click', () => {
    document.getElementById('search-mode').style.display = 'flex';
    document.getElementById('coord-mode').classList.remove('show');
  });

  document.getElementById('search-input').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (locked) {
      const hint = document.getElementById('lock-hint');
      hint.classList.add('show');
      setTimeout(() => hint.classList.remove('show'), 2500);
      return;
    }
    const q = e.target.value.trim();
    if (!q) return;
    gpsStatusEl.textContent = 'Searching...';
    gpsStatusEl.className = '';
    const xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q) + '&limit=1', true);
    xhr.timeout = 10000;
    xhr.setRequestHeader('Accept', 'application/json');
    xhr.onload = () => {
      try {
        const data = JSON.parse(xhr.responseText);
        if (data && data.length > 0) {
          const lat = parseFloat(data[0].lat);
          const lng = parseFloat(data[0].lon);
          setPilotPosition(lat, lng, 'Search: ' + (data[0].display_name || q).substring(0, 50));
        } else {
          gpsStatusEl.textContent = 'Not found.';
          gpsStatusEl.className = 'fail';
        }
      } catch (e) {
        gpsStatusEl.textContent = 'Search failed.';
        gpsStatusEl.className = 'fail';
      }
    };
    xhr.onerror = () => { gpsStatusEl.textContent = 'Network error.'; gpsStatusEl.className = 'fail'; };
    xhr.send();
  });

  document.getElementById('lat-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') setFromCoords(); });
  document.getElementById('lng-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') setFromCoords(); });

  document.getElementById('radius-input').addEventListener('input', updateZoneCircle);

  gpsStatusEl.addEventListener('click', () => {
    if (pilotLat != null && pilotLon != null && map) {
      map.setView([pilotLat, pilotLon], 12);
    }
  });

  document.getElementById('controls').addEventListener('wheel', (e) => e.preventDefault(), { passive: false });

  document.getElementById('toggle-btn').addEventListener('click', toggleMonitoring);

  document.getElementById('theme-btn').addEventListener('click', toggleTheme);
}

// ============================================
// Boot
// ============================================

if (typeof L !== 'undefined') {
  document.addEventListener('DOMContentLoaded', () => {
    applyTheme();
    initMap();
    initUI();
    initGPS();
  });
} else {
  document.getElementById('loading').textContent = 'Error: Leaflet failed to load.';
}
</script>
</body>
</html>
